name: Canvas UI Verify

on:
  pull_request:
    types: [ready_for_review, synchronize]
    paths:
      - "packages/utils/geometry/**"
      - "packages/excalidraw/element/**"
      - "packages/excalidraw/shapes.tsx"
      - "packages/excalidraw/**/collision*"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to verify"
        required: true

jobs:
  canvas-ui-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: cli/gh-action@v2
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install launcher dependencies
        working-directory: .demo/scripts
        run: npm ci

      - name: Run canvas UI verify
        working-directory: .demo/scripts
        run: npx tsx run-canvas-verify.ts
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
